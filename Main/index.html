<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taverns & Castles</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/josephg/noisejs/perlin.js"></script>
</head>
<body>
    <div id="building-info-modal">
        <div class="modal-section" id="info-header">
            <h2 id="info-name">Názov budovy</h2>
        </div>
    
        <div id="info-middle-row">
            <div class="modal-section" id="info-image-box">
                <img id="info-img" src="" alt="Náhľad">
            </div>
            <div class="modal-section" id="info-desc-box">
                <p id="info-desc">Popis budovy</p>
            </div>
        </div>
    
        <div class="modal-section" id="info-stats-box">
            <p><strong>Level:</strong> <span id="info-level">1</span></p>
            <p><strong>Health:</strong> <span id="info-health">100/100</span></p>
            <p><strong>People inside:</strong> <span id="info-people">0</span></p>
            <p><strong>Production:</strong> <span id="info-production">Active</span></p>
        </div>
    
        <div class="modal-section" id="info-buttons-box">
            <button class="info-btn upgrade" onclick="upgradeBuilding()">Upgrade</button>
            <button class="info-btn sell" onclick="sellBuilding()">Sell</button>
            <button class="info-btn exit" onclick="closeBuildingInfo()">Exit</button>
        </div>
    </div>
    <div id="category-bar">
        <button class="cat-btn active" onclick="loadBuildingMenu('houses')">Housing</button>
        <button class="cat-btn" onclick="loadBuildingMenu('castles')">Defense</button>
        <button class="cat-btn" onclick="loadBuildingMenu('mines')">Resource gathering</button>
        <button class="cat-btn" onclick="loadBuildingMenu('fields')">Farming</button>
    </div>

    <button id="battle-btn" onclick="startBattle()">Battle ⚔️</button>

    <div id="stats-container">
        <div id="permanent-stats">
            <div class="stat-item" title="Gold"><span class="stat-icon">🪙</span> <span id="stat-gold">0</span></div>
            <div class="stat-item" title="Population"><span class="stat-icon">👥</span> <span id="stat-pop">0</span></div>
        </div>

        <div class="stat-group">
            <button class="stat-toggle-btn" onclick="toggleStats('resources-list')">Resources ▼</button>
            <div id="resources-list" class="stat-dropdown" style="display: none;">
                <div class="stat-item" title="Wood"><span class="stat-icon">🪵</span> <span id="stat-wood">0</span></div>
                <div class="stat-item" title="Stone"><span class="stat-icon">🪨</span> <span id="stat-stone">0</span></div>
            </div>
        </div>

        <div id="time-display">
            <span id="day-text">Day 1</span>
            <span style="color: #8b0000;">|</span>
            <span id="time-text">08:00</span>
        </div>

        <div class="stat-group">
            <button class="stat-toggle-btn" onclick="toggleStats('food-list')">Food ▼</button>
            <div id="food-list" class="stat-dropdown" style="display: none;">
                <div class="stat-item" title="Food"><span class="stat-icon">🍞</span> <span id="stat-food">0</span></div>
                <div class="stat-item" title="Days Left"><span class="stat-icon">⏳</span> <span id="stat-days">0</span> d</div>
            </div>
        </div>
    </div>
    <div id="realm-display">Realm Name</div>

    <div id="building-menu"></div>

    <canvas id="gameCanvas"></canvas>

    <script src="buildingHandler.js"></script>
    <script src="generator.js"></script>
    <script src="npcManager.js"></script>
    <script src="../EscMenu/EscMenuScript.js"></script>
    <script src="timeHandler.js"></script>
</body>
</html>
