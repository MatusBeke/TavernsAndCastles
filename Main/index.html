<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taverns & Castles</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/josephg/noisejs/perlin.js"></script>
</head>
<body>
    <div id="category-bar">
        <button class="cat-btn active" onclick="loadBuildingMenu('houses')">Houses</button>
        <button class="cat-btn" onclick="loadBuildingMenu('castles')">Castles</button>
        <button class="cat-btn" onclick="loadBuildingMenu('mines')">Mines</button>
        <button class="cat-btn" onclick="loadBuildingMenu('fields')">Fields</button>
    </div>


    <div id="stats-container">
        <div id="permanent-stats">
            <div class="stat-item" title="Gold"><span class="stat-icon">🪙</span> <span id="stat-gold">0</span></div>
            <div class="stat-item" title="Population"><span class="stat-icon">👥</span> <span id="stat-pop">0</span></div>
        </div>

        <div class="stat-group">
            <button class="stat-toggle-btn" onclick="toggleStats('resources-list')">Resources ▼</button>
            <div id="resources-list" class="stat-dropdown" style="display: none;">
                <div class="stat-item" title="Wood"><span class="stat-icon">🪵</span> <span id="stat-wood">0</span></div>
                <div class="stat-item" title="Stone"><span class="stat-icon">🪨</span> <span id="stat-stone">0</span></div>
            </div>
        </div>

        <div class="stat-group">
            <button class="stat-toggle-btn" onclick="toggleStats('food-list')">Food ▼</button>
            <div id="food-list" class="stat-dropdown" style="display: none;">
                <div class="stat-item" title="Food"><span class="stat-icon">🍞</span> <span id="stat-food">0</span></div>
                <div class="stat-item" title="Days Left"><span class="stat-icon">⏳</span> <span id="stat-days">0</span> d</div>
            </div>
        </div>
    </div>
    <div id="realm-display">Realm Name</div>

    <div id="building-menu"></div>

    <canvas id="gameCanvas"></canvas>

    <script src="buildingHandler.js"></script>
    <script src="generator.js"></script>
    <script src="npcManager.js"></script>
    <script src="../EscMenu/EscMenuScript.js"></script>
</body>
</html>
